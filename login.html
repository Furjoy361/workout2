<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plank Rival Login</title>

<style>

/* Page layout */
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Card container */
.container{
background:#1e1e1e;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
text-align:center;
width:90%;
max-width:400px;
}

/* Title */
h1{
margin-bottom:30px;
font-size:2rem;
}

/* Google button */
#loginBtn{
background:#4285F4;
border:none;
padding:14px 20px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
width:100%;
transition:background 0.2s;
}

#loginBtn:hover{
background:#5a95ff;
}

/* Small text */
p{
margin-top:20px;
font-size:14px;
color:#aaa;
}

/* Mobile adjustments */
@media (max-width:500px){

.container{
padding:30px 20px;
}

h1{
font-size:1.7rem;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🏋️ Plank Rival</h1>

<button id="loginBtn">Sign in with Google</button>

<p>Track your workouts and compete with others</p>

</div>

<script type="module">

import { loginWithGoogle } from "./auth.js";

const btn = document.getElementById("loginBtn");

btn.addEventListener("click", () => {
  loginWithGoogle();
});

</script>

</body>
</html>
