<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plank Rival Login</title>

<style>

/* Page layout */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

/* PAGE */

body{
background:#FFFFFF;
color:#222222;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* LOGIN CARD */

.container{
width:100%;
max-width:420px;

background:#F5F5F5;

padding:45px 30px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,0.1);

text-align:center;

animation:fadeSlide 1s ease forwards;
}

/* TITLE */

h1{
font-size:34px;
font-weight:700;
margin-bottom:30px;

background:linear-gradient(90deg,#FF6B2B,#FF4C4C);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* GOOGLE BUTTON */

#loginBtn{
width:100%;

padding:18px;

border:none;
border-radius:35px;

font-size:18px;
font-weight:bold;

cursor:pointer;

background:linear-gradient(145deg,#FF6B2B,#FF4C4C);
color:white;

box-shadow:0 12px 35px rgba(255,107,43,0.35);

transition:0.25s;
}

#loginBtn:hover{
transform:scale(1.03);
box-shadow:0 15px 40px rgba(255,76,76,0.6);
}

/* SUBTEXT */

p{
margin-top:22px;
font-size:15px;
color:#666666;
}

/* ANIMATION */

@keyframes fadeSlide{

0%{
opacity:0;
transform:translateY(25px);
}

100%{
opacity:1;
transform:translateY(0);
}

/* MOBILE */

}

@media(max-width:600px){

.container{
padding:40px 25px;
}

h1{
font-size:30px;
}

#loginBtn{
font-size:17px;
padding:16px;
}

}
</style>

</head>

<body>

<div class="container">

<h1>🏋️ Plank Rival</h1>

<button id="loginBtn">Sign in with Google</button>

<p>Track your workouts and compete with others</p>

</div>

<script type="module">

import { loginWithGoogle } from "./auth.js";

const btn = document.getElementById("loginBtn");

btn.addEventListener("click", () => {
  loginWithGoogle();
});

</script>

</body>
</html>
