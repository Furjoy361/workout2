<!DOCTYPE html>
<html>

<head>
<title>Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:#FFFFFF;
color:#222222;
min-height:100vh;
display:flex;
flex-direction:column;
padding:30px 20px;
}

/* TITLE */

h1{
font-size:36px;
font-weight:700;
margin-bottom:40px;
text-align:center;

background:linear-gradient(90deg,#FF6B2B,#FF4C4C);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:fadeSlide 1s ease forwards;
opacity:0;
}

/* STATS */

.stat{
width:100%;
background:#F5F5F5;

padding:26px 24px;
margin-bottom:18px;

border-radius:20px;

font-size:26px;
font-weight:600;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 12px 35px rgba(0,0,0,0.08);

animation:fadeSlide 1s ease forwards;
}

/* WORKOUT BUTTONS */

button{
width:100%;

padding:20px;
margin-top:16px;

border:none;
border-radius:35px;

font-size:22px;
font-weight:bold;

cursor:pointer;

background:linear-gradient(145deg,#FF6B2B,#FF4C4C);
color:white;

box-shadow:0 12px 35px rgba(255,107,43,0.35);

transition:0.25s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 15px 40px rgba(255,76,76,0.6);
}

/* LOGOUT BUTTON */

#logout{
background:#F5F5F5;
color:#222222;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* ANIMATION */

@keyframes fadeSlide{

0%{
opacity:0;
transform:translateY(25px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:600px){

body{
padding:25px 18px;
}

h1{
font-size:30px;
margin-bottom:30px;
}

.stat{
font-size:22px;
padding:22px;
}

button{
font-size:20px;
padding:18px;
}

}

</style>

</head>

<body>

<h1 id="welcome">Loading...</h1>

<div class="stat">Pushups: <span id="pushups">0</span></div>
<div class="stat">Squats: <span id="squats">0</span></div>
<div class="stat">Best Plank: <span id="plank">0</span></div>

<br>

<button onclick="location.href='pushup.html'">Start Pushups</button>
<button onclick="location.href='squat.html'">Start Squats</button>
<button onclick="location.href='plank.html'">Start Plank</button>

<br><br>

<button onclick="location.href='leaderboard.html'">🏆 Leaderboard</button>

<br><br>

<button id="logout">Logout</button>

<script type="module">

import { auth } from "./firebase.js";

import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { db } from "./firebase.js";

import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


onAuthStateChanged(auth, async (user)=>{

if(user){

document.getElementById("welcome").innerText =
"Welcome " + user.displayName;

const docRef = doc(db,"users",user.uid);

const docSnap = await getDoc(docRef);

if(docSnap.exists()){

const data = docSnap.data();

document.getElementById("pushups").innerText = data.pushups;
document.getElementById("squats").innerText = data.squats;
document.getElementById("plank").innerText = data.plank;

}

}

else{

window.location.href="login.html";

}

});

document.getElementById("logout").onclick=()=>{
signOut(auth);
};

</script>

</body>

</html>
