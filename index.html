<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="menu" id="menu">

<script>

function toggleMenu(){
const menu=document.getElementById("menu");

if(menu.style.display==="flex"){
menu.style.display="none";
}else{
menu.style.display="flex";
}
}

window.onclick=function(e){
if(!e.target.matches('.hamburger')){
const menu=document.getElementById("menu");
menu.style.display="none";
}
}

</script>
